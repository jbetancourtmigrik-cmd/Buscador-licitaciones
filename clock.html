<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Digital - Múltiples Zonas Horarias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .title {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .clock-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
        }

        .timezone-label {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .city-name {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 15px;
        }

        .digital-clock {
            font-size: 3em;
            font-weight: bold;
            color: #333;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
        }

        .time-format {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
        }

        .offset {
            font-size: 0.85em;
            color: #999;
            margin-top: 8px;
        }

        /* Animación de parpadeo para el separador */
        .separator {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% {
                opacity: 1;
            }
            50%, 100% {
                opacity: 0;
            }
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .title {
                font-size: 1.8em;
            }

            .digital-clock {
                font-size: 2em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">⏰ Reloj Mundial</h1>
        <div class="clocks-grid" id="clocksContainer"></div>
    </div>

    <script>
        // Configuración de zonas horarias
        const timezones = [
            { name: 'Nueva York', timezone: 'America/New_York', city: 'EST/EDT' },
            { name: 'Londres', timezone: 'Europe/London', city: 'GMT/BST' },
            { name: 'Madrid', timezone: 'Europe/Madrid', city: 'CET/CEST' },
            { name: 'París', timezone: 'Europe/Paris', city: 'CET/CEST' },
            { name: 'Tokio', timezone: 'Asia/Tokyo', city: 'JST' },
            { name: 'Sídney', timezone: 'Australia/Sydney', city: 'AEDT/AEST' },
            { name: 'Dubai', timezone: 'Asia/Dubai', city: 'GST' },
            { name: 'Hong Kong', timezone: 'Asia/Hong_Kong', city: 'HKT' },
            { name: 'Ciudad de México', timezone: 'America/Mexico_City', city: 'CST/CDT' },
            { name: 'São Paulo', timezone: 'America/Sao_Paulo', city: 'BRT' },
            { name: 'Singapur', timezone: 'Asia/Singapore', city: 'SGT' },
            { name: 'Estambul', timezone: 'Europe/Istanbul', city: 'EET' }
        ];

        // Función para obtener la hora en una zona horaria específica
        function getTimeInTimezone(timezone) {
            const date = new Date();
            const formatter = new Intl.DateTimeFormat('es-ES', {
                timeZone: timezone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            return formatter.format(date);
        }

        // Función para obtener el offset de la zona horaria
        function getTimezoneOffset(timezone) {
            const date = new Date();
            const utcDate = new Date(date.toLocaleString('en-US', { timeZone: 'UTC' }));
            const tzDate = new Date(date.toLocaleString('en-US', { timeZone: timezone }));
            const offset = (tzDate - utcDate) / (1000 * 60 * 60);
            const sign = offset >= 0 ? '+' : '';
            return `UTC ${sign}${offset.toFixed(0)}`;
        }

        // Función para crear las tarjetas de reloj
        function createClockCards() {
            const container = document.getElementById('clocksContainer');
            container.innerHTML = '';

            timezones.forEach(tz => {
                const card = document.createElement('div');
                card.className = 'clock-card';
                card.innerHTML = `
                    <div class="timezone-label">${tz.name}</div>
                    <div class="city-name">${tz.city}</div>
                    <div class="digital-clock" data-timezone="${tz.timezone}">
                        ${getTimeInTimezone(tz.timezone)}
                    </div>
                    <div class="offset">${getTimezoneOffset(tz.timezone)}</div>
                    <div class="time-format">24 horas</div>
                `;
                container.appendChild(card);
            });
        }

        // Función para actualizar todos los relojes
        function updateClocks() {
            const clocks = document.querySelectorAll('.digital-clock');
            clocks.forEach(clock => {
                const timezone = clock.getAttribute('data-timezone');
                clock.textContent = getTimeInTimezone(timezone);
            });
        }

        // Crear tarjetas al cargar la página
        createClockCards();

        // Actualizar relojes cada segundo
        setInterval(updateClocks, 1000);

        // Actualizar también cada minuto para ajustar offsets si es necesario
        setInterval(createClockCards, 60000);
    </script>
</body>
</html>
